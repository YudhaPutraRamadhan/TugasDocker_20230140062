<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Home - Data Mahasiswa</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f8f9fa; margin: 0; padding: 30px; color: #333; }
        .container { max-width: 1100px; margin: 0 auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #eee; padding-bottom: 15px; margin-bottom: 30px; }
        h2 { margin: 0; color: #2c3e50; }

        /* Layout Profil di Tengah */
        .profile-section { display: flex; flex-direction: column; align-items: center; text-align: center; margin-bottom: 40px; }
        .foto-admin { width: 100px; height: 100px; object-fit: cover; border-radius: 50%; border: 3px solid #007bff; padding: 3px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); margin-bottom: 10px; }
        .profile-desc { font-size: 1rem; color: #555; font-style: italic; }

        /* Form Upload Profil */
        .upload-form { display: flex; flex-direction: column; align-items: center; gap: 10px; background: #fdfdfd; padding: 20px; border-radius: 8px; border: 1px dashed #ccc; width: 100%; max-width: 350px; }
        .upload-form input[type="file"] { font-size: 12px; width: 100%; }
        .upload-form input[type="text"] { font-size: 13px; padding: 10px; border: 1px solid #ccc; border-radius: 4px; width: 100%; box-sizing: border-box;}
        .upload-form button { font-size: 13px; padding: 10px; background: #0d6efd; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; width: 100%;}
        .upload-form button:hover { background: #0b5ed7; }

        /* Tabel Data Mahasiswa */
        table { width: 100%; border-collapse: collapse; margin-top: 15px; background: white; border-radius: 8px; overflow: hidden; box-shadow: 0 0 0 1px #eee; }
        th, td { padding: 15px; text-align: left; vertical-align: middle; border-bottom: 1px solid #eee; }
        th { background-color: #34495e; color: white; font-weight: 600; text-transform: uppercase; font-size: 0.85rem; letter-spacing: 0.5px; }
        tr:hover { background-color: #f1f4f6; }

        .btn { padding: 10px 18px; text-decoration: none; border-radius: 6px; font-weight: 600; font-size: 0.9rem; display: inline-block; transition: all 0.2s; }
        .btn:hover { opacity: 0.9; transform: translateY(-1px); }
        .btn-input { background: #28a745; color: white; box-shadow: 0 2px 5px rgba(40,167,69,0.3); }
        .btn-logout { background: #dc3545; color: white; box-shadow: 0 2px 5px rgba(220,53,69,0.3); }
        .table-header { display: flex; justify-content: space-between; align-items: flex-end; border-bottom: 2px solid #007bff; padding-bottom: 10px; }
        .empty-state { text-align: center; color: #777; font-style: italic; padding: 30px !important; }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h2>Dashboard 20230140062</h2>
        <a th:href="@{/logout}" class="btn btn-logout">Logout</a>
    </div>

    <div class="profile-section">
        <div th:if="${adminProfile.fotoPath != null}">
            <img th:src="@{'/uploads/' + ${adminProfile.fotoPath}}" class="foto-admin" alt="Admin Profile">
            <div class="profile-desc">
                <span th:text="${adminProfile.deskripsi}"></span>
            </div>
        </div>

        <form class="upload-form" th:if="${adminProfile.fotoPath == null}" th:action="@{/upload-profile}" method="post" enctype="multipart/form-data">
            <input type="file" name="file" accept="image/*" required>
            <input type="text" name="deskripsi" placeholder="Ketik deskripsi singkatmu di sini..." required>
            <button type="submit">Simpan Foto & Deskripsi</button>
        </form>
    </div>

    <div class="table-header">
        <h3 style="margin: 0; color: #2c3e50;">Data Mahasiswa</h3>
        <a th:href="@{/form}" class="btn btn-input">+ Input Mahasiswa Baru</a>
    </div>

    <table>
        <thead>
        <tr>
            <th>No</th>
            <th>Nama</th>
            <th>NIM</th>
            <th>Jenis Kelamin</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="mhs, iter : ${listMhs}">
            <td th:text="${iter.count}"></td>
            <td th:text="${mhs.Nama}" style="font-weight: 500;"></td>
            <td th:text="${mhs.NIM}"></td>
            <td th:text="${mhs.JenisKelamin}"></td>
        </tr>
        <tr th:if="${#lists.isEmpty(listMhs)}">
            <td colspan="4" class="empty-state">Belum ada data mahasiswa yang terdaftar.</td>
        </tr>
        </tbody>
    </table>
</div>
</body>
</html>
