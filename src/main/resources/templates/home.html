<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Home - Data Mahasiswa</title>
    <style>
        body { font-family: Arial; margin: 20px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 12px; text-align: left; }
        th { background-color: #f2f2f2; }
        .header { display: flex; justify-content: space-between; align-items: center; }
        .btn { padding: 8px 15px; text-decoration: none; border-radius: 4px; }
        .btn-input { background: #28a745; color: white; }
        .btn-logout { background: #dc3545; color: white; }
    </style>
</head>
<body>
<div class="header">
    <h2>MY Website 20230140062</h2>
    <a th:href="@{/logout}" class="btn btn-logout">Logout</a>
</div>
<p>Selamat datang di aplikasi!</p>

<a th:href="@{/form}" class="btn btn-input">Input Data Mahasiswa</a>

<h3>Data Mahasiswa</h3>
<table>
    <thead>
    <tr>
        <th>No</th>
        <th>Nama</th>
        <th>NIM</th>
        <th>Jenis Kelamin</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="mhs, iter : ${listMhs}">
        <td th:text="${iter.count}"></td>
        <td th:text="${mhs.Nama}"></td>
        <td th:text="${mhs.NIM}"></td>
        <td th:text="${mhs.JenisKelamin}"></td>
    </tr>
    <tr th:if="${#lists.isEmpty(listMhs)}">
        <td colspan="4" style="text-align: center;">Belum ada data</td>
    </tr>
    </tbody>
</table>
</body>
</html>
