<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Form Input Mahasiswa</title>
    <style>
        body { font-family: Arial; margin: 40px; line-height: 1.6; }
        .form-group { margin-bottom: 15px; }
        label { display: block; font-weight: bold; }
        input[type="text"] { width: 100%; padding: 8px; margin-top: 5px; }
        .btn-submit { background: #007bff; color: white; border: none; padding: 10px 20px; cursor: pointer; border-radius: 4px; }
    </style>
</head>
<body>
<h2>Form Input Mahasiswa</h2>
<form th:action="@{/save}" th:object="${user}" method="post">
    <div class="form-group">
        <label>Nama:</label>
        <input type="text" th:field="*{Nama}" required>
    </div>
    <div class="form-group">
        <label>NIM:</label>
        <input type="text" th:field="*{NIM}" required>
    </div>
    <div class="form-group">
        <label>Jenis Kelamin:</label>
        <input type="radio" th:field="*{JenisKelamin}" value="Laki-laki"> Laki-laki
        <input type="radio" th:field="*{JenisKelamin}" value="Perempuan"> Perempuan
    </div>
    <button type="submit" class="btn-submit">Submit</button>
</form>
<br>
<a th:href="@{/home}">Kembali ke Home</a>
</body>
</html>
