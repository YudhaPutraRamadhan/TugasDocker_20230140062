<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Login Page</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background: #eef2f3; margin: 0; }
        .login-card { background: white; padding: 2.5rem; border-radius: 12px; box-shadow: 0 8px 20px rgba(0,0,0,0.1); width: 100%; max-width: 350px; }
        .login-card h2 { margin-top: 0; text-align: center; color: #2c3e50; margin-bottom: 1.5rem; font-size: 1.8rem; }
        label { font-weight: 600; color: #555; font-size: 0.9rem; }
        input { width: 100%; padding: 12px; margin: 8px 0 20px 0; box-sizing: border-box; border: 1px solid #ddd; border-radius: 6px; font-size: 1rem; transition: border-color 0.3s; }
        input:focus { border-color: #007bff; outline: none; box-shadow: 0 0 5px rgba(0,123,255,0.2); }
        button { width: 100%; padding: 12px; background: #007bff; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 1rem; font-weight: bold; transition: background-color 0.3s; }
        button:hover { background: #0056b3; }
        .error-msg { color: #842029; background: #f8d7da; padding: 10px; border-radius: 6px; font-size: 0.9rem; text-align: center; margin-bottom: 15px; border: 1px solid #f5c6cb; }
    </style>
</head>
<body>
<div class="login-card">
    <h2>Welcome Back</h2>
    <div th:if="${error}" th:text="${error}" class="error-msg"></div>
    <form th:action="@{/login}" method="post">
        <label>Username</label>
        <input type="text" name="username" placeholder="Masukkan username..." required>

        <label>Password</label>
        <input type="password" name="password" placeholder="Masukkan password..." required>

        <button type="submit">Login</button>
    </form>
</div>
</body>
</html>
